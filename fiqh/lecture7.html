<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحاضرة 7 | الفقه — أخصر المختصرات</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<!--
  LECTURE_STATUS: EMPTY
  هذا الملف محاضرة فارغة بانتظار التعبئة.
  عند إضافة محتوى حقيقي، غيّر التعليق أعلاه إلى LECTURE_STATUS: FILLED
  حتى تتعرف عليه صفحة الفئة (index.html) كمحاضرة مكتملة ويزيد العداد تلقائيًا.
-->
<meta name="lecture-status" content="empty">
<style>
  :root {
    --gold: #C5A55A;
    --gold-light: #E8D5A3;
    --ivory: #FAF7F0;
    --brown-deep: #3A2A1A;
    --brown-mid: #5C4033;
    --brown-warm: #7A5C40;
    --green-islamic: #1B6B4A;
    --green-light: #E8F5EE;
    --green-accent: #2D8B6A;
    --cream: #FFF8EC;
    --border-soft: #E5D5BF;
    --text-main: #2C1E10;
    --text-secondary: #6B5744;
    --shadow-soft: 0 2px 20px rgba(58, 42, 26, 0.08);
    --shadow-card: 0 4px 24px rgba(58, 42, 26, 0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--ivory);
    color: var(--text-main);
    line-height: 1.9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(160deg, var(--brown-deep) 0%, var(--brown-mid) 60%, var(--brown-warm) 100%);
    color: var(--ivory);
    padding: 40px 24px;
    text-align: center;
  }
  .breadcrumb {
    font-size: 13px;
    color: var(--gold-light);
    margin-bottom: 14px;
    opacity: 0.85;
  }
  .breadcrumb a { color: var(--gold-light); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(24px, 5vw, 34px);
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }
  .empty-card {
    max-width: 520px;
    text-align: center;
    background: white;
    border: 1px dashed var(--border-soft);
    border-radius: 20px;
    padding: 50px 36px;
    box-shadow: var(--shadow-soft);
  }
  .empty-icon { font-size: 48px; margin-bottom: 18px; opacity: 0.6; }
  .empty-card h2 {
    font-family: 'Amiri', serif;
    color: var(--brown-deep);
    font-size: 22px;
    margin-bottom: 12px;
  }
  .empty-card p {
    color: var(--text-secondary);
    font-size: 15px;
    line-height: 1.9;
  }
  .back-link {
    display: inline-block;
    margin-top: 24px;
    padding: 10px 26px;
    background: var(--green-light);
    color: var(--green-islamic);
    text-decoration: none;
    border-radius: 20px;
    font-weight: 700;
    font-size: 14px;
  }
  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-secondary);
    font-size: 13px;
  }
</style>
</head>
<body>

<header class="header">
  <div class="breadcrumb"><a href="../index.html">الأكاديمية الشرعية</a> ← <a href="index.html">الفقه — أخصر المختصرات</a> ← المحاضرة 7</div>
  <h1>المحاضرة 7</h1>
</header>

<main>
  <div class="empty-card">
    <div class="empty-icon">📝</div>
    <h2>هذه المحاضرة لم تُملأ بعد</h2>
    <p>سيتم إضافة الشرح المفصّل وبطاقات المراجعة لهذه المحاضرة قريبًا بإذن الله.</p>
    <a class="back-link" href="index.html">← الرجوع لقائمة المحاضرات</a>
  </div>
</main>

<footer>الأكاديمية الشرعية — طلب العلم عبادة</footer>

</body>
</html>
